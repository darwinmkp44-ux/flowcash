name: Android CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Run Unit & Robolectric Tests
        run: gradle test
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: mypassword
          KEY_PASSWORD: mypassword

      - name: Build PRO Release APK
        run: gradle assembleProRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: mypassword
          KEY_PASSWORD: mypassword

      - name: Build BUSINESS Release APK
        run: gradle assembleBusinessRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: mypassword
          KEY_PASSWORD: mypassword

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/pro/release/app-pro-release.apk \
             app/build/outputs/apk/pro/release/FlowCash-PRO-v1.2-release.apk
          mv app/build/outputs/apk/business/release/app-business-release.apk \
             app/build/outputs/apk/business/release/FlowCash-BUSINESS-v1.2-release.apk

      - name: Upload APKs as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowcash-release-apks
          path: |
            app/build/outputs/apk/pro/release/FlowCash-PRO-v1.2-release.apk
            app/build/outputs/apk/business/release/FlowCash-BUSINESS-v1.2-release.apk

      - name: Create GitHub Release (Tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/pro/release/FlowCash-PRO-v1.2-release.apk
            app/build/outputs/apk/business/release/FlowCash-BUSINESS-v1.2-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## FlowCash ${{ github.ref_name }}

            ### PRO APK
            - `FlowCash-PRO-v1.2-release.apk` — Finanças pessoais

            ### BUSINESS APK
            - `FlowCash-BUSINESS-v1.2-release.apk` — Finanças pessoais + Gestão empresarial (CRM, Stock, Vendas, Dívidas, Equipa, Relatórios)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (Push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/pro/release/FlowCash-PRO-v1.2-release.apk
            app/build/outputs/apk/business/release/FlowCash-BUSINESS-v1.2-release.apk
          name: Build #${{ github.run_number }}
          tag_name: build-${{ github.run_number }}
          body: |
            Build automático gerado a partir do branch **main**.

            ### APKs
            - `FlowCash-PRO-v1.2-release.apk` — Versão PRO
            - `FlowCash-BUSINESS-v1.2-release.apk` — Versão BUSINESS
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
