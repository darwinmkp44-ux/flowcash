name: Android CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Generate dynamic signing keystore
        run: |
          keytool -genkey -v \
            -keystore my-upload-key.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=FlowCash, OU=Development, O=FlowCash, L=Maputo, S=Maputo, C=MZ" \
            -storepass mypassword \
            -keypass mypassword

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Run Unit & Robolectric Tests
        run: gradle test
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: mypassword
          KEY_PASSWORD: mypassword

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: mypassword
          KEY_PASSWORD: mypassword

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/FlowCash-v1.0-release.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowcash-release-apk
          path: app/build/outputs/apk/release/FlowCash-v1.0-release.apk

      - name: Create GitHub Release (Tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/FlowCash-v1.0-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            Nova versão ${{ github.ref_name }} do FlowCash!

            ### APK
            - Anexado automaticamente pela pipeline CI/CD.
            - Apenas instalar no dispositivo Android (minSdk 24).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (Push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/FlowCash-v1.0-release.apk
          name: Build #${{ github.run_number }}
          tag_name: build-${{ github.run_number }}
          body: |
            Build automático gerado a partir do branch **main**.

            ### APK
            - Anexado automaticamente pela pipeline CI/CD.
            - Apenas instalar no dispositivo Android (minSdk 24).
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
