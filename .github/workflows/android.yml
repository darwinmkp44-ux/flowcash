name: Android CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Generate dynamic signing keystore
        run: |
          keytool -genkey -v \
            -keystore my-upload-key.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=FlowCash, OU=Development, O=FlowCash, L=Maputo, S=Maputo, C=MZ" \
            -storepass mypassword \
            -keypass mypassword

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Run Unit & Robolectric Tests
        run: gradle test
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: mypassword
          KEY_PASSWORD: mypassword

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: mypassword
          KEY_PASSWORD: mypassword

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowcash-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Release {0}', github.ref_name) || format('Build #{0}', github.run_number) }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('build-{0}', github.run_number) }}
          body: |
            ${{ startsWith(github.ref, 'refs/tags/v') && format('Nova versão {0} do FlowCash!', github.ref_name) || 'Build automático gerado a partir do branch **main**.' }}
            
            ### APK
            - Anexado automaticamente pela pipeline CI/CD.
            - Apenas instalar no dispositivo Android (minSdk 24).
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
